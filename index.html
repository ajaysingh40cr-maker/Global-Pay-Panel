<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Pay Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  ⚠ LIVE ACTIVATION
</div>

<div class="container">

  <div class="logo-box">
    <h1>GLOBAL PAY</h1>
    <p>Professional Payment Panel</p>
  </div>

  <div class="welcome-card">
    <h2>ACCOUNT FUNDS</h2>
    <p>LIVE ACTIVATION & EARN COMMISSION</p>
  </div>

  <div class="tabs">
  <button id="showRegister" class="active">Register</button>
  <button id="showLogin">Login</button>
</div>
<div id="registerForm">

<h2>Create Your Account</h2>

<input type="text" placeholder="Username">

<input type="tel" placeholder="Phone Number">

<input type="password" placeholder="Password">

<input type="text" placeholder="OTP">

<button class="main-btn">
📩 Send OTP
</button>

<button class="main-btn">
📝 Register
</button>

<hr>

<button class="google-btn" id="googleLoginBtn">
Continue with Google
</button>

</div>


<div id="loginForm" style="display:none;">

<h2>Login</h2>

<input type="text" placeholder="Username or Phone Number">

<input type="password" placeholder="Password">

<p style="text-align:right;font-size:14px;color:#8b5cf6;cursor:pointer;">
Forgot Password?
</p>

<button class="main-btn">
🔐 Login
</button>

</div>

  <div class="download">
    <button>📱 Download Android App</button>
    <div class="form-box">

<h2>Create Your Account</h2>

<input type="tel" placeholder="Phone Number">

<input type="password" placeholder="Password">

<input type="text" placeholder="OTP">

<button class="main-btn">
Register with Phone
</button>

<hr>

<input type="email" placeholder="Google Email">

<input type="password" placeholder="Password">

<button class="google-btn" id="googleLoginBtn">
Continue with Google
</button>

    </div>
  </div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
