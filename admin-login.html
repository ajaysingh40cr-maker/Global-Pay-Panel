<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Pay - Admin Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body style="background:#0f172a;color:white;font-family:Arial;text-align:center;padding:40px;">

<h1>GLOBAL PAY</h1>
<h2>ADMIN PANEL</h2>

<br>

<input type="email" id="email" placeholder="Admin Email"
style="width:300px;padding:12px;border-radius:10px;border:none;"><br><br>

<input type="password" id="password" placeholder="Password"
style="width:300px;padding:12px;border-radius:10px;border:none;"><br><br>

<button onclick="adminLogin()"
style="background:#dc2626;color:white;border:none;padding:12px 25px;border-radius:10px;font-size:18px;">
🔒 Login
</button>

<script>
function adminLogin(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(email==="admin@globalpay.com" && password==="Global@123"){
window.location.href="admin.html";
}else{
alert("Invalid Email or Password");
}

}
</script>

</body>
</html>
