<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Pay Admin</title>
<link rel="stylesheet" href="style.css">
</head>

<body style="background:#0f172a;color:white;font-family:Arial;padding:20px;">

<h1 style="text-align:center;">GLOBAL PAY ADMIN PANEL</h1>

<div class="card">
<h2>User Details</h2>

<input type="text" id="userId" placeholder="User Email / UID"
style="width:100%;padding:10px;margin:10px 0;">

<input type="number" id="balance" placeholder="Total Balance"
style="width:100%;padding:10px;margin:10px 0;">

 <input type="number" id="commission" placeholder="Commission"
style="width:100%;padding:10px;margin:10px 0;">

<input type="number" id="transactions" placeholder="Transactions"
style="width:100%;padding:10px;margin:10px 0;">

<button id="saveBtn" style="width:100%;padding:12px;background:#16a34a;color:white;border:none;border-radius:10px;">
💾 Save
</button>
<br><br>

<a href="dashboard.html">
<button style="width:100%;padding:12px;background:#dc2626;color:white;border:none;border-radius:10px;">
⬅ Back to Dashboard
</button>
</a>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCL8vjtmJtSIJvax22qaRb3as2UPvmcVEE",
  authDomain: "global-pay-panel.firebaseapp.com",
  databaseURL: "https://global-pay-panel-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "global-pay-panel",
  storageBucket: "global-pay-panel.firebasestorage.app",
  messagingSenderId: "50490595463",
  appId: "1:50490595463:web:69457a3db6634522b3c022",
  measurementId: "G-ENPBE84IZT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

console.log("Realtime Database Connected");
 document.getElementById("saveBtn").addEventListener("click", async () => {

const userId = document.getElementById("userId").value;
const balance = document.getElementById("balance").value;
const commission = document.getElementById("commission").value;
const transactions = document.getElementById("transactions").value;

if (!userId) {
  alert("Please enter User Email / UID");
  return;
}

try {
  await set(ref(db, "users/" + userId), {
    balance: balance,
    commission: commission,
    transactions: transactions
  });

  alert("Data Saved Successfully");
} catch (e) {
  alert("Firebase Error: " + e.message);
  console.error(e);
}
  </script>
</body>
</html>
